blueprint:
  name: "coffee-barista-agentic"
  version: "2.0"
  description: >
    Agentic coffee barista system. A reasoning‑enabled orchestrator autonomously
    decides when to check weather, predict mood, brew coffee, collect feedback,
    and learn from past preferences — no hardcoded flow.
  author: "aatar"
  tags: [coffee, barista, weather, mood, ollama, podman, agentic]

# ─────────────────────────── settings ───────────────────────────
settings:
  default_model: "ollama/qwen3:1.7b"
  default_temperature: 0.6
  ollama_base_url: "http://localhost:11434"
  timeout_seconds: 120
  max_retries: 3

# ─────────────────────────── model providers ────────────────────
model_providers:
  ollama_local:
    provider: ollama
    base_url: "http://localhost:11434"

# ─────────────────────────── shared state ───────────────────────
state:
  fields:
    messages:
      type: "list[message]"
      reducer: append
    weather_data:
      type: string
      default: null
      nullable: true
      description: "Weather summary from OpenWeatherMap"
    mood:
      type: string
      default: null
      nullable: true
      description: "Predicted user mood"
    coffee_recommendation:
      type: string
      default: null
      nullable: true
      description: "Recommended coffee drink"
    coffee_reason:
      type: string
      default: null
      nullable: true
      description: "Why this coffee was recommended"
    brew_result:
      type: string
      default: null
      nullable: true
      description: "Response from barista fake API"
    user_feedback:
      type: string
      default: null
      nullable: true
      description: "User feedback text"
    memory_notes:
      type: string
      default: null
      nullable: true
      description: "Past preference notes loaded from MEMORY.md"

# ─────────────────────────── agents ─────────────────────────────
agents:
  orchestrator:
    name: "Coffee Barista Orchestrator"
    model: "${settings.default_model}"
    model_provider: ollama_local
    tools:
      - get_weather
      - read_memory
      - save_memory
      - brew_coffee
    human_in_the_loop:
      enabled: true
      trigger: before_response
      message: "Orchestrator wants to present something to you."
    system_prompt: |
      You are an autonomous Coffee Barista Orchestrator with reasoning abilities.
      You have tools at your disposal. THINK step‑by‑step and DECIDE what to do.

      AVAILABLE TOOLS:
        - get_weather    → fetch current weather from OpenWeatherMap
        - read_memory    → read user's past preferences from MEMORY.md
        - save_memory    → save feedback/preference to MEMORY.md
        - brew_coffee    → POST a brew order to the barista API

      YOUR GOAL: prepare the best possible coffee for the user every morning.

      HOW TO THINK:
        1. Start by fetching the weather AND reading memory (past preferences).
           These are independent — call both.
        2. Reason about the weather data to infer the user's likely mood
           (happy, sad, calm, energetic, melancholic, angry …).
        3. Based on the mood AND past preference memory, choose a coffee.
           If memory says the user disliked a certain coffee for a certain mood,
           AVOID that combination. If memory is empty, use your best judgement.
        4. Call brew_coffee to prepare the chosen drink.
        5. Present the result to the user: what you brewed, why, and based on
           what mood inference.
        6. Wait for user feedback.

      HANDLING FEEDBACK:
        - If the user likes it → save positive feedback to memory, wish them
          a great day.
        - If the user dislikes it → save the negative feedback to memory
          (format: "Disliked <coffee> when mood was <mood>. Reason: <feedback>").
          Ask if they want another recommendation and wait.
          If yes → re‑think mood + memory and suggest a NEW coffee (do not repeat).
          If no  → wish them well.

      ERROR HANDLING:
        - If get_weather fails, retry up to ${settings.max_retries} times.
          If still failing, tell the user and ask them to pick a mood manually.
        - If brew_coffee fails, retry up to ${settings.max_retries} times.
          If still failing, apologize and give the recipe as text.

      IMPORTANT:
        - Do NOT follow a fixed script. Reason about the situation.
        - If something unexpected happens, think about the best action.
        - You may skip steps if they don't make sense (e.g., if memory already
          has today's weather from a recent run, you can skip fetching again).

  mood_advisor:
    name: "Mood & Coffee Advisor"
    model: "${settings.default_model}"
    model_provider: ollama_local
    tools: [read_memory]
    system_prompt: |
      You are a mood analyst and coffee connoisseur.

      When the orchestrator delegates to you, you receive weather data and
      memory notes. Your job:
        1. Infer the user's likely mood from the weather.
        2. Cross‑reference with memory to avoid previously disliked pairings.
        3. Recommend a single coffee with a short reason.

      Return structured output:
        mood, coffee_recommendation, coffee_reason
    output_schema:
      mood:
        type: string
        description: "Predicted user mood"
      coffee_recommendation:
        type: string
        description: "Recommended coffee drink"
      coffee_reason:
        type: string
        description: "Reason for recommendation"

# ─────────────────────────── tools ──────────────────────────────
tools:
  get_weather:
    type: api
    method: GET
    url: "https://api.openweathermap.org/data/2.5/weather?q=Istanbul&units=metric&appid=${env.OPENWEATHER_API_KEY}"
    description: "Fetch current weather from OpenWeatherMap"
    auth:
      type: api_key
      key_env: "OPENWEATHER_API_KEY"
      header: "X-Api-Key"
    parameters:
      city:
        type: string
        required: false
        default: "Istanbul"
        description: "City name for weather lookup"

  brew_coffee:
    type: api
    method: POST
    url: "http://localhost:1453/baristafakeapi"
    description: "Send brew order to the barista fake API"
    headers:
      Content-Type: "application/json"
    parameters:
      coffee_name:
        type: string
        required: true
        description: "Name of the coffee to brew"
      mood:
        type: string
        required: false
        description: "Mood context for the brew"

  read_memory:
    type: function
    description: "Read past user preferences and feedback from MEMORY.md"
    parameters:
      file_path:
        type: string
        required: false
        default: "MEMORY.md"
    impl: "coffee_barista.tools.read_memory"

  save_memory:
    type: function
    description: "Append user feedback / preference to MEMORY.md"
    parameters:
      entry:
        type: string
        required: true
        description: "Feedback line to append"
      file_path:
        type: string
        required: false
        default: "MEMORY.md"
    impl: "coffee_barista.tools.save_memory"

# ─────────────────────────── graph ──────────────────────────────
# Minimal graph — the orchestrator reasons about what to do next.
# The loop lets it keep running until it decides the session is done.
graph:
  entry_point: orchestrate
  nodes:
    orchestrate:
      agent: orchestrator
      description: "Reasoning‑enabled orchestrator — autonomously runs the coffee flow"

    advise:
      agent: mood_advisor
      description: "Specialist mood + coffee advisor (delegated to when orchestrator needs a second opinion)"

  edges:
    # Orchestrator runs its full ReAct loop then hands off to the advisor
    # if mood analysis is needed, otherwise ends.
    # Multi-turn conversation is handled by the interactive REPL + thread checkpointing —
    # not by looping inside the graph. Each user message = one graph.invoke() call.
    - from: orchestrate
      to:
        - condition: "state.mood == null and state.weather_data != null"
          target: advise
        - default: END

    # Advisor returns its structured recommendation to the orchestrator
    - from: advise
      to: END

# ─────────────────────────── memory ─────────────────────────────
memory:
  backend: in_memory
  checkpoint_every: node

# ─────────────────────────── deploy ─────────────────────────────
deploy:
  platform: podman
  podman:
    host_port: 8080
    container_name: "coffee-barista-agentic"
    network: "host"

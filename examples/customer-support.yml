blueprint:
  name: "customer-support-agent"
  version: "1.0"
  description: "Multi-agent customer support with routing"

settings:
  default_model: "ollama/qwen3:1.7b"
  default_temperature: 0.3
  ollama_base_url: "http://localhost:11434"

state:
  fields:
    messages:
      type: "list[message]"
      reducer: append
    department:
      type: string
      default: null
    resolved:
      type: boolean
      default: false

agents:
  router:
    model: "${settings.default_model}"
    system_prompt: |
      You are a routing agent. Classify the customer request into one of:
      billing, technical, or general.
      Respond with JSON: {"department": "billing"|"technical"|"general"}
    tools: [classify_intent]
    output_schema:
      department:
        type: string
        enum: [billing, technical, general]

  billing_agent:
    name: "Billing Specialist"
    model: "${settings.default_model}"
    system_prompt: |
      You are a billing specialist. Help customers with invoices,
      payments, and subscription changes.
    tools: [lookup_invoice]

  technical_agent:
    name: "Technical Support"
    model: "${settings.default_model}"
    system_prompt: |
      You are a technical support agent. Diagnose and resolve
      technical issues. Be precise and step-by-step.

tools:
  classify_intent:
    type: function
    description: "Classify customer intent into a department"
    parameters:
      message:
        type: string
        required: true

  lookup_invoice:
    type: api
    method: GET
    url: "https://api.acme.com/invoices/{invoice_id}"
    auth:
      type: bearer
      token_env: "BILLING_API_KEY"

graph:
  entry_point: router
  nodes:
    router:
      agent: router
      description: "Classify and route customer requests"
    billing:
      agent: billing_agent
      description: "Handle billing inquiries"
    technical:
      agent: technical_agent
      description: "Handle technical issues"
  edges:
    - from: router
      to:
        - condition: "state.department == 'billing'"
          target: billing
        - condition: "state.department == 'technical'"
          target: technical
        - default: END
    - from: billing
      to: END
    - from: technical
      to: END

memory:
  backend: in_memory

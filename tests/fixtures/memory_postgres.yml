blueprint:
  name: "postgres-agent"
  version: "1.0"

settings:
  default_model: "gpt-4o"

state:
  fields:
    messages:
      type: "list[message]"
      reducer: append

agents:
  assistant:
    model: "${settings.default_model}"
    system_prompt: "You are a helpful assistant."

graph:
  entry_point: assistant
  nodes:
    assistant:
      agent: assistant
  edges:
    - from: assistant
      to: END

memory:
  backend: postgres
  connection_string_env: DATABASE_URL

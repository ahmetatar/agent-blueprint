blueprint:
  name: "coffee-barista-agentic-r1"
  version: "1.0"
  description: >
    Single-call coffee barista powered by DeepSeek-R1:1.5b running locally via Ollama.
    The model reasons through mood, weather context, and preference in one native
    thinking pass — no tools, no loops, no second LLM call.
    Tell it about your day and it will recommend a coffee.
  author: "aatar"
  tags: [coffee, barista, deepseek-r1, ollama, reasoning, thinking, single-shot]

# ─────────────────────────── settings ───────────────────────────
settings:
  default_model: "ollama/deepseek-r1:1.5b"
  default_temperature: 0.6
  max_graph_steps: 3          # safety net — this graph is single-shot, should never loop

# ─────────────────────────── model providers ────────────────────
model_providers:
  ollama_local:
    provider: ollama
    base_url: "http://localhost:11434"

# ─────────────────────────── shared state ───────────────────────
state:
  fields:
    messages:
      type: "list[message]"
      reducer: append

# ─────────────────────────── agents ─────────────────────────────
agents:
  barista:
    name: "DeepSeek-R1 Barista"
    model: "deepseek-r1:1.5b"
    model_provider: ollama_local
    temperature: 0.6
    reasoning:
      enabled: true
      params:
        # DeepSeek-R1 reasons natively via <think>…</think> blocks in a single call.
        # No special "enable" flag — reasoning is always on for this model family.
        # num_ctx gives enough context window for the full thinking trace + response.
        # num_predict caps the combined output (thinking tokens + final answer).
        num_ctx: 8192
        num_predict: 2048
    system_prompt: |
      You are a thoughtful coffee barista. The customer will tell you about their
      day, mood, or the weather outside. Use your reasoning to work through the
      right coffee choice before you speak — your thinking is yours alone.

      THINK through these questions silently:
        1. What mood or energy level is the customer in right now?
        2. What coffee profile fits that state?
           (bold, smooth, sweet, bitter, warm, iced, light, strong…)
        3. Are there any constraints in what they said?
           (no caffeine, no dairy, something quick, etc.)
        4. Which single drink is the best match for this exact moment?

      Then respond with:
        - The coffee name
        - One sentence: why it fits the mood
        - A brief preparation note (e.g. "served hot, double shot" / "cold brew, oat milk")

      Keep the response warm, concise, and confident. You are a professional.

# ─────────────────────────── graph ──────────────────────────────
# Single node, single edge to END — DeepSeek-R1's internal reasoning
# handles the full decision chain without delegating to a second call.
graph:
  entry_point: brew
  nodes:
    brew:
      agent: barista
      description: "Single reasoning call — think and recommend"
  edges:
    - from: brew
      to: END

# ─────────────────────────── memory ─────────────────────────────
memory:
  backend: in_memory

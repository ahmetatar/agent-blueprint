<svg width="820" height="180" viewBox="0 0 820 180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#080d1a"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="indigo" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <linearGradient id="sky" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
    <linearGradient id="textgrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e2e8f0"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
    <filter id="glow-indigo" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-sky" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arr-indigo" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto">
      <path d="M0,1 L0,6 L6,3.5 z" fill="#6366f1"/>
    </marker>
    <marker id="arr-sky" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto">
      <path d="M0,1 L0,6 L6,3.5 z" fill="#0ea5e9"/>
    </marker>
    <marker id="arr-gray" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto">
      <path d="M0,1 L0,6 L6,3.5 z" fill="#475569"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="820" height="180" rx="14" fill="url(#bg)"/>

  <!-- Blueprint grid dots -->
  <g opacity="0.08" fill="#7c83ff">
    <circle cx="20"  cy="20"  r="1.2"/><circle cx="50"  cy="20"  r="1.2"/><circle cx="80"  cy="20"  r="1.2"/>
    <circle cx="110" cy="20"  r="1.2"/><circle cx="140" cy="20"  r="1.2"/><circle cx="170" cy="20"  r="1.2"/>
    <circle cx="200" cy="20"  r="1.2"/><circle cx="230" cy="20"  r="1.2"/><circle cx="260" cy="20"  r="1.2"/>
    <circle cx="290" cy="20"  r="1.2"/><circle cx="320" cy="20"  r="1.2"/>
    <circle cx="20"  cy="50"  r="1.2"/><circle cx="50"  cy="50"  r="1.2"/><circle cx="80"  cy="50"  r="1.2"/>
    <circle cx="110" cy="50"  r="1.2"/><circle cx="140" cy="50"  r="1.2"/><circle cx="170" cy="50"  r="1.2"/>
    <circle cx="200" cy="50"  r="1.2"/><circle cx="230" cy="50"  r="1.2"/><circle cx="260" cy="50"  r="1.2"/>
    <circle cx="290" cy="50"  r="1.2"/><circle cx="320" cy="50"  r="1.2"/>
    <circle cx="20"  cy="80"  r="1.2"/><circle cx="50"  cy="80"  r="1.2"/><circle cx="80"  cy="80"  r="1.2"/>
    <circle cx="110" cy="80"  r="1.2"/><circle cx="140" cy="80"  r="1.2"/><circle cx="170" cy="80"  r="1.2"/>
    <circle cx="200" cy="80"  r="1.2"/><circle cx="230" cy="80"  r="1.2"/><circle cx="260" cy="80"  r="1.2"/>
    <circle cx="290" cy="80"  r="1.2"/><circle cx="320" cy="80"  r="1.2"/>
    <circle cx="20"  cy="110" r="1.2"/><circle cx="50"  cy="110" r="1.2"/><circle cx="80"  cy="110" r="1.2"/>
    <circle cx="110" cy="110" r="1.2"/><circle cx="140" cy="110" r="1.2"/><circle cx="170" cy="110" r="1.2"/>
    <circle cx="200" cy="110" r="1.2"/><circle cx="230" cy="110" r="1.2"/><circle cx="260" cy="110" r="1.2"/>
    <circle cx="290" cy="110" r="1.2"/><circle cx="320" cy="110" r="1.2"/>
    <circle cx="20"  cy="140" r="1.2"/><circle cx="50"  cy="140" r="1.2"/><circle cx="80"  cy="140" r="1.2"/>
    <circle cx="110" cy="140" r="1.2"/><circle cx="140" cy="140" r="1.2"/><circle cx="170" cy="140" r="1.2"/>
    <circle cx="200" cy="140" r="1.2"/><circle cx="230" cy="140" r="1.2"/><circle cx="260" cy="140" r="1.2"/>
    <circle cx="290" cy="140" r="1.2"/><circle cx="320" cy="140" r="1.2"/>
    <circle cx="20"  cy="162" r="1.2"/><circle cx="50"  cy="162" r="1.2"/><circle cx="80"  cy="162" r="1.2"/>
    <circle cx="110" cy="162" r="1.2"/><circle cx="140" cy="162" r="1.2"/><circle cx="170" cy="162" r="1.2"/>
    <circle cx="200" cy="162" r="1.2"/><circle cx="230" cy="162" r="1.2"/><circle cx="260" cy="162" r="1.2"/>
    <circle cx="290" cy="162" r="1.2"/><circle cx="320" cy="162" r="1.2"/>
  </g>

  <!-- Glow halos behind nodes -->
  <circle cx="68"  cy="90"  r="22" fill="#6366f1" opacity="0.12"/>
  <circle cx="168" cy="90"  r="26" fill="#6366f1" opacity="0.15"/>
  <circle cx="264" cy="55"  r="18" fill="#0ea5e9" opacity="0.14"/>
  <circle cx="264" cy="125" r="18" fill="#0ea5e9" opacity="0.14"/>
  <circle cx="358" cy="90"  r="20" fill="#6366f1" opacity="0.12"/>

  <!-- Edges -->
  <!-- START → router -->
  <line x1="86" y1="90" x2="138" y2="90" stroke="#6366f1" stroke-width="1.6" stroke-dasharray="4,3" opacity="0.7" marker-end="url(#arr-indigo)"/>
  <!-- router → branch A -->
  <path d="M 185 80 Q 210 55 244 55" fill="none" stroke="#6366f1" stroke-width="1.6" opacity="0.75" marker-end="url(#arr-indigo)"/>
  <!-- router → branch B -->
  <path d="M 185 100 Q 210 125 244 125" fill="none" stroke="#6366f1" stroke-width="1.6" opacity="0.75" marker-end="url(#arr-indigo)"/>
  <!-- branch A → END -->
  <path d="M 282 55 Q 308 55 338 82" fill="none" stroke="#0ea5e9" stroke-width="1.6" opacity="0.75" marker-end="url(#arr-sky)"/>
  <!-- branch B → END -->
  <path d="M 282 125 Q 308 125 338 98" fill="none" stroke="#0ea5e9" stroke-width="1.6" opacity="0.75" marker-end="url(#arr-sky)"/>

  <!-- Condition labels on edges -->
  <text x="210" y="49"  font-family="ui-monospace,monospace" font-size="8.5" fill="#6366f1" opacity="0.85">billing</text>
  <text x="205" y="142" font-family="ui-monospace,monospace" font-size="8.5" fill="#6366f1" opacity="0.85">technical</text>

  <!-- Node: START -->
  <circle cx="68" cy="90" r="18" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
  <text x="68" y="94" font-family="ui-monospace,monospace" font-size="9" fill="#94a3b8" text-anchor="middle" font-weight="600">START</text>

  <!-- Node: router (primary, larger) -->
  <circle cx="168" cy="90" r="22" fill="#1e293b" stroke="url(#indigo)" stroke-width="2" filter="url(#glow-indigo)"/>
  <text x="168" y="87" font-family="ui-monospace,monospace" font-size="9.5" fill="#a5b4fc" text-anchor="middle" font-weight="700">router</text>
  <circle cx="168" cy="96" r="3" fill="#6366f1" opacity="0.7"/>

  <!-- Node: branch A -->
  <circle cx="264" cy="55" r="16" fill="#1e293b" stroke="url(#sky)" stroke-width="2" filter="url(#glow-sky)"/>
  <text x="264" y="51" font-family="ui-monospace,monospace" font-size="8.5" fill="#7dd3fc" text-anchor="middle" font-weight="600">billing</text>
  <circle cx="264" cy="60" r="2.5" fill="#0ea5e9" opacity="0.7"/>

  <!-- Node: branch B -->
  <circle cx="264" cy="125" r="16" fill="#1e293b" stroke="url(#sky)" stroke-width="2" filter="url(#glow-sky)"/>
  <text x="264" y="121" font-family="ui-monospace,monospace" font-size="8" fill="#7dd3fc" text-anchor="middle" font-weight="600">technical</text>
  <circle cx="264" cy="130" r="2.5" fill="#0ea5e9" opacity="0.7"/>

  <!-- Node: END -->
  <circle cx="358" cy="90" r="18" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
  <text x="358" y="94" font-family="ui-monospace,monospace" font-size="9" fill="#94a3b8" text-anchor="middle" font-weight="600">END</text>

  <!-- Divider line -->
  <line x1="400" y1="28" x2="400" y2="152" stroke="#1e293b" stroke-width="1.5"/>

  <!-- Main title: agent-blueprint -->
  <text x="430" y="92"
    font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
    font-size="40" font-weight="800" letter-spacing="-1"
    fill="url(#textgrad)">agent-blueprint</text>

  <!-- Tag line -->
  <text x="432" y="120"
    font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
    font-size="14.5" fill="#64748b" letter-spacing="0.3">
    Declarative AI agent orchestration via YAML
  </text>

  <!-- abp badge -->
  <rect x="432" y="132" width="36" height="18" rx="4" fill="#6366f1" opacity="0.18"/>
  <text x="450" y="145"
    font-family="ui-monospace,monospace"
    font-size="11" font-weight="700" fill="#818cf8" text-anchor="middle" letter-spacing="0.5">abp</text>

  <!-- YAML badge -->
  <rect x="476" y="132" width="44" height="18" rx="4" fill="#0ea5e9" opacity="0.15"/>
  <text x="498" y="145"
    font-family="ui-monospace,monospace"
    font-size="11" font-weight="700" fill="#38bdf8" text-anchor="middle" letter-spacing="0.3">yaml</text>

  <!-- Python badge -->
  <rect x="528" y="132" width="56" height="18" rx="4" fill="#f59e0b" opacity="0.13"/>
  <text x="556" y="145"
    font-family="ui-monospace,monospace"
    font-size="11" font-weight="700" fill="#fbbf24" text-anchor="middle" letter-spacing="0.3">python</text>
</svg>
